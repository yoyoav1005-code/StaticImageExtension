<div class="setting-group">
    <label class="setting-label">
        <input type="checkbox" id="static_image_enabled">
        Enable Static Image Panel
    </label>
</div>

<div class="setting-group">
    <label for="static_image_url">Image Source:</label>
    <select id="static_image_url" class="setting-control">
        <!-- Options populated by JavaScript -->
    </select>
</div>

<div class="setting-group">
    <label for="static_image_width">Panel Width: <span id="static_image_width_value">250px</span></label>
    <input type="range" id="static_image_width" class="setting-control" 
           min="150" max="400" value="250">
</div>

<div class="setting-group">
    <label class="setting-label">
        <input type="checkbox" id="static_image_collapsed">
        Start Collapsed
    </label>
</div>

<div class="setting-group">
    <label class="setting-label">
        <input type="checkbox" id="static_image_autohide">
        Auto-hide when idle
    </label>
</div>

<div class="setting-group" id="static_image_delay_group" style="display:none">
    <label for="static_image_delay">Hide After (seconds):</label>
    <input type="number" id="static_image_delay" class="setting-control" 
           min="5" max="300" value="30">
</div>

<div class="setting-group">
    <button id="static_image_add_image" class="setting-btn">Add Custom Image</button>
    <small class="setting-hint">Add image path (e.g., assets/myimage.png)</small>
</div>

<div class="setting-group">
    <button id="static_image_save_settings" class="setting-btn" style="background-color: #4CAF50;">Save Settings</button>
    <small class="setting-hint">Click to save all settings to storage</small>
</div>
